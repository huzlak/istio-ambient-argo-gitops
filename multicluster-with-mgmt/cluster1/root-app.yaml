apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solo-istio-ambient-mgmt-cluster1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/huzlak/istio-ambient-argo-gitops
    targetRevision: main
    path: multicluster-with-mgmt/cluster1/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
