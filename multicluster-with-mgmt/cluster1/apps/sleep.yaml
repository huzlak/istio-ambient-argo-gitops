apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster1-sleep
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/huzlak/istio-ambient-argo-gitops
    targetRevision: main
    path: multicluster-with-mgmt/manifests/sleep
  destination:
    server: https://kubernetes.default.svc
    namespace: httpbin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
