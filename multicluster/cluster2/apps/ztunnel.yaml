apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster2-ztunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: us-docker.pkg.dev/soloio-img/istio-helm
    chart: ztunnel
    targetRevision: 1.28.4-solo
    helm:
      values: |
        network: cluster2
        env:
          SKIP_VALIDATE_TRUST_DOMAIN: "true"
          ISTIO_META_CLUSTER_ID: cluster2
          ISTIO_META_NETWORK: cluster2
        l7Telemetry:
          enabled: true
  destination:
    server: CLUSTER2_SERVER
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
