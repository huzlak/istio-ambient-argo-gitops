apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster2-eastwest-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: REPO_URL
    targetRevision: TARGET_REVISION
    path: multicluster/manifests/eastwest/cluster2
  destination:
    server: CLUSTER2_SERVER
    namespace: istio-eastwest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
