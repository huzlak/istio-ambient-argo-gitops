apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster1-eastwest-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/huzlak/istio-ambient-argo-gitops
    targetRevision: main
    path: multicluster/manifests/eastwest/cluster1
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-eastwest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
