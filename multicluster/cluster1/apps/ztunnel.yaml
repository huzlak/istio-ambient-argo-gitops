apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster1-ztunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/huzlak/istio-ambient-argo-gitops
    chart: ztunnel
    targetRevision: 1.28.4-solo
    helm:
      values: |
        network: cluster1
        env:
          SKIP_VALIDATE_TRUST_DOMAIN: "true"
          ISTIO_META_CLUSTER_ID: cluster1
          ISTIO_META_NETWORK: cluster1
        l7Telemetry:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
