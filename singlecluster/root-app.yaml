apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solo-istio-ambient
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPO_URL
    targetRevision: TARGET_REVISION
    path: singlecluster/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
